<!DOCTYPE html>
<html lang="ca">
<head>
  <meta charset="UTF-8">
  <title>Clients FOC</title>
  <style>
    body { font-family: Arial; background: #f4f4f4; margin: 20px; }
    .container { max-width: 1000px; margin: auto; display: flex; gap: 20px; }
    .list, .form { background: white; padding: 15px; border-radius: 10px; flex: 1; box-shadow: 0 0 10px rgba(0,0,0,0.1); }
    h2 { text-align: center; }
    .client-item { padding: 8px; border-bottom: 1px solid #ddd; display: flex; justify-content: space-between; cursor: pointer;}
    .client-item:hover { background: #eee; }
    .field { margin: 10px 0; }
    input, select { width: 100%; padding: 6px; border-radius: 5px; border: 1px solid #ccc; }
    button { padding: 8px; border: none; border-radius: 5px; cursor: pointer; }
    .btn-delete { background: #dc3545; color: white; }
    .btn-save { background: #007BFF; color: white; width: 100%; }
    .btn-new { background: #28a745; color: white; width: 100%; margin-bottom: 10px; }
  </style>
</head>
<body>

<h2>Clients FOC</h2>

<div class="container">

  <div class="list">
    <button class="btn-new" onclick="nouClient()">+ Nou Client</button>
    <div id="clientList"></div>
  </div>

  <div class="form">
    <div class="field"><input id="nom" placeholder="Nom"></div>
    <div class="field"><input id="numClient" placeholder="Nº client"></div>
    <div class="field"><input id="poble" placeholder="Poble"></div>
    <button class="btn-save" onclick="guardarClient()">Guardar</button>
  </div>

</div>

<!-- 🔥 FIREBASE -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
  import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyBuIZdfoUuTekmRLifaS8K4cR_QJKaHLCw",
    authDomain: "focentellesclients.firebaseapp.com",
    projectId: "focentellesclients",
    storageBucket: "focentellesclients.firebasestorage.app",
    messagingSenderId: "754969193561",
    appId: "1:754969193561:web:6f66c5ff9e5cd824a89548"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  let clients = [];
  let indexActual = null;

  // 🔄 Temps real
  onSnapshot(collection(db, "clients"), (snapshot) => {
    clients = [];
    snapshot.forEach((d) => {
      clients.push({ id: d.id, ...d.data() });
    });
    renderList();
  });

  function renderList(){
    const list = document.getElementById("clientList");
    list.innerHTML = "";

    clients.forEach((c,i)=>{
      const div = document.createElement("div");
      div.className="client-item";
      div.innerHTML = `
        <span>${c.nom} (${c.poble})</span>
        <button onclick="eliminarClient(${i})">🗑</button>
      `;
      div.onclick = ()=>carregarClient(i);
      list.appendChild(div);
    });
  }

  window.nouClient = function(){
    indexActual=null;
    nom.value="";
    numClient.value="";
    poble.value="";
  }

  window.guardarClient = async function(){
    const client = {
      nom: nom.value,
      numClient: numClient.value,
      poble: poble.value
    };

    if(indexActual === null){
      await addDoc(collection(db, "clients"), client);
    } else {
      await setDoc(doc(db, "clients", clients[indexActual].id), client);
    }

    nouClient();
  }

  window.carregarClient = function(i){
    const c = clients[i];
    indexActual = i;
    nom.value = c.nom;
    numClient.value = c.numClient;
    poble.value = c.poble;
  }

  window.eliminarClient = async function(i){
    if(confirm("Eliminar client?")){
      await deleteDoc(doc(db, "clients", clients[i].id));
    }
  }
</script>

</body>
</html>
