<!DOCTYPE html>
<html lang="ca">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FOC Clients</title>
<link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
<style>
    :root {
        --primary: #2563eb;
        --primary-hover: #1d4ed8;
        --success: #16a34a;
        --success-hover: #15803d;
        --danger: #dc2626;
        --danger-hover: #b91c1c;
        --bg-body: #f1f5f9;
        --bg-card: #ffffff;
        --text-main: #1e293b;
        --text-muted: #64748b;
        --border: #e2e8f0;
        --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        --shadow-lg: 0 10px 15px -3px rgba(0, 0, 0, 0.1), 0 4px 6px -2px rgba(0, 0, 0, 0.05);
        --radius-md: 8px;
        --radius-lg: 12px;
    }

    * { box-sizing: border-box; }

    body {
        font-family: 'Plus Jakarta Sans', sans-serif;
        background-color: var(--bg-body);
        color: var(--text-main);
        margin: 0;
        padding: 0;
        line-height: 1.5;
    }

    .main-header {
        background: var(--bg-card);
        padding: 1rem 2rem;
        box-shadow: 0 1px 3px 0 rgba(0, 0, 0, 0.1);
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: sticky;
        top: 0;
        z-index: 100;
    }

    .main-header h1 {
        margin: 0;
        font-size: 1.5rem;
        font-weight: 700;
        color: var(--primary);
    }

    .app-wrapper {
        max-width: 1400px;
        margin: 2rem auto;
        padding: 0 1rem;
    }

    .container {
        display: grid;
        grid-template-columns: 1.5fr 1fr;
        gap: 1.5rem;
        align-items: start;
    }

    .card {
        background: var(--bg-card);
        padding: 1.5rem;
        border-radius: var(--radius-lg);
        box-shadow: var(--shadow-md);
        border: 1px solid var(--border);
    }

    h3 {
        margin-top: 0;
        font-weight: 600;
        color: var(--text-main);
        border-bottom: 2px solid var(--border);
        padding-bottom: 0.5rem;
        margin-bottom: 1.5rem;
    }

    .form-group { margin-bottom: 1rem; }
    .form-label {
        display: block;
        font-size: 0.875rem;
        font-weight: 500;
        color: var(--text-muted);
        margin-bottom: 0.25rem;
    }

    input[type="text"], input[type="password"], select {
        width: 100%;
        padding: 0.75rem;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
        background-color: #fbfcfd;
        font-family: inherit;
        font-size: 1rem;
        transition: all 0.2s;
    }

    input:focus, select:focus {
        outline: none;
        border-color: var(--primary);
        box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        background-color: #fff;
    }

    button {
        padding: 0.75rem 1.5rem;
        border-radius: var(--radius-md);
        border: none;
        cursor: pointer;
        font-weight: 600;
        font-family: inherit;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        gap: 0.5rem;
        transition: all 0.2s;
    }

    .btn-primary { background: var(--primary); color: white; }
    .btn-primary:hover { background: var(--primary-hover); }
    .btn-success { background: var(--success); color: white; }
    .btn-success:hover { background: var(--success-hover); }
    .btn-danger { background: #fee2e2; color: var(--danger); }
    .btn-excel { background: #e2e8f0; color: #1e293b; }
    .btn-excel:hover { background: #cbd5e1; }

    .search-filters {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 0.75rem;
        margin-bottom: 1rem;
        background: #f8fafc;
        padding: 1rem;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
    }
    .search-filters input { grid-column: span 2; }

    .checkbox-group {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
        margin: 1rem 0;
        padding: 0.5rem;
        background: #f8fafc;
        border-radius: var(--radius-md);
        border: 1px solid var(--border);
    }

    .checkbox-label {
        background: white;
        border: 1px solid var(--border);
        padding: 0.5rem 0.75rem;
        border-radius: 20px;
        font-size: 0.875rem;
        cursor: pointer;
        display: flex;
        align-items: center;
        gap: 0.5rem;
        transition: all 0.2s;
    }

    .checkbox-label:has(input:checked) {
        background-color: var(--primary);
        color: white;
        border-color: var(--primary);
    }

    #clientList { margin-top: 1rem; max-height: 60vh; overflow-y: auto; }

    .client-item {
        padding: 1rem;
        border-radius: var(--radius-md);
        margin-bottom: 0.75rem;
        display: flex;
        justify-content: space-between;
        align-items: center;
        background: var(--bg-card);
        border: 1px solid var(--border);
        cursor: pointer;
        transition: all 0.2s;
    }

    .client-item:hover { transform: translateX(3px); border-color: var(--primary); background: #f0f7ff; }

    .badge {
        background: #e0f2fe;
        color: #0369a1;
        padding: 2px 8px;
        border-radius: 6px;
        font-size: 0.75rem;
        font-weight: 600;
    }

    .login-container { height: 100vh; display: flex; align-items: center; justify-content: center; background: linear-gradient(135deg, #e0f2fe 0%, #dbeafe 100%); }
    .login-card { width: 100%; max-width: 400px; padding: 2.5rem; text-align: center; background: white; border-radius: var(--radius-lg); box-shadow: var(--shadow-lg); }
    
    .hidden { display: none !important; }
</style>
</head>
<body>

<div id="loginDiv" class="login-container">
    <div class="login-card">
        <h2 style="color:var(--primary); font-size: 2rem; margin-bottom: 0.5rem;">FOC</h2>
        <p style="color:var(--text-muted); margin-bottom: 2rem;">Gestió Interna de Clients</p>
        <div class="form-group">
            <input id="password" type="password" placeholder="Contrasenya d'accés">
        </div>
        <button class="btn-primary" style="width:100%" onclick="login()">Entrar</button>
        <div id="loginError" class="hidden" style="color:var(--danger); margin-top: 1rem; font-size: 0.875rem;"></div>
    </div>
</div>

<div id="appDiv" class="hidden">
    <header class="main-header">
        <h1>Gestor Clients FOC</h1>
        <button class="btn-danger" onclick="logout()">Tancar Sessió</button>
    </header>

    <div class="app-wrapper">
        <div class="container">
            <div class="card">
                <div style="display: flex; gap: 0.5rem; margin-bottom: 1.5rem;">
                    <button class="btn-success" style="flex: 1;" onclick="nouClient()">+ Afegir Nou Client</button>
                    <button class="btn-excel" title="Exportar llistat actual a Excel" onclick="exportarExcel()">
                        Exportar Excel
                    </button>
                </div>
                
                <h3>Filtres</h3>
                <div class="search-filters">
                    <input id="filtreNom" placeholder="Cercar per nom...">
                    <input id="filtreNum" placeholder="Cercar per número...">
                    <select id="filtrePoble"></select>
                    <select id="filtreXarxa"></select>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" class="filtreContracte" value="Fibra">Fibra</label>
                    <label class="checkbox-label"><input type="checkbox" class="filtreContracte" value="IP">IP</label>
                    <label class="checkbox-label"><input type="checkbox" class="filtreContracte" value="Mòbil">Mòbil</label>
                    <label class="checkbox-label"><input type="checkbox" class="filtreContracte" value="Fix">Fix</label>
                    <label class="checkbox-label"><input type="checkbox" class="filtreContracte" value="Wimax">Wimax</label>
                </div>
                <div id="clientList"></div>
            </div>

            <div class="card" style="position: sticky; top: 80px;">
                <h3 id="formTitle">Detalls del Client</h3>
                <div class="form-group">
                    <label class="form-label">Nom complet</label>
                    <input id="nom" placeholder="Nom del client">
                </div>
                <div class="form-group">
                    <label class="form-label">Número de Client</label>
                    <input id="numClient" placeholder="Ex: FOC001">
                </div>
                <div style="display: grid; grid-template-columns: 1fr 1fr; gap: 1rem;">
                    <div class="form-group">
                        <label class="form-label">Població</label>
                        <select id="poble"></select>
                    </div>
                    <div class="form-group">
                        <label class="form-label">Xarxa</label>
                        <select id="xarxaExterna"></select>
                    </div>
                </div>
                <div class="form-group">
                    <label class="form-label">Velocitat</label>
                    <select id="velocitatFibra">
                        <option value="">No seleccionat</option>
                        <option>100/100 Mbps</option>
                        <option>300/300 Mbps</option>
                        <option>600/600 Mbps</option>
                        <option>1000/1000 Mbps</option>
                    </select>
                </div>
                <div class="checkbox-group">
                    <label class="checkbox-label"><input type="checkbox" class="contracteOpcio" value="Fibra">Fibra</label>
                    <label class="checkbox-label"><input type="checkbox" class="contracteOpcio" value="IP">IP</label>
                    <label class="checkbox-label"><input type="checkbox" class="contracteOpcio" value="Mòbil">Mòbil</label>
                    <label class="checkbox-label"><input type="checkbox" class="contracteOpcio" value="Fix">Fix</label>
                    <label class="checkbox-label"><input type="checkbox" class="contracteOpcio" value="Wimax">Wimax</label>
                </div>
                <button class="btn-primary" style="width:100%; margin-top: 1rem;" onclick="guardarClient()">Guardar Canvis</button>
            </div>
        </div>
    </div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-app.js";
import { getFirestore, collection, addDoc, onSnapshot, doc, deleteDoc, setDoc } from "https://www.gstatic.com/firebasejs/12.11.0/firebase-firestore.js";

const firebaseConfig = {
    apiKey: "AIzaSyBu...", 
    authDomain: "focentellesclients.firebaseapp.com",
    projectId: "focentellesclients"
};

const app = initializeApp(firebaseConfig);
const db = getFirestore(app);
const PASSWORD = "FOC6pu6A";

let clients = [];
let filtratsActuals = []; // Per exportar només el que es veu
let indexActual = null;

const poblacions = ["Centelles","Tona","Vic","Granollers","Taradell","Aiguafreda","Sant Martí de Centelles","La Garriga","Hostalets de Balenyà","Seva","Sant Hipòtil de Voltregà","Rubí","Santa Perpetua de Moguda","Santa Maria d'Oló","Avinyó","Sant Julià de Vilatorta","Folgueroles"];
const xarxes = ["FOC","Adamo","Masmovil","Saranet","Ion Mobile","Emagina"];

window.login = () => {
    const passInput = document.getElementById("password");
    if(passInput.value === PASSWORD){
        document.getElementById("loginDiv").classList.add("hidden");
        document.getElementById("appDiv").classList.remove("hidden");
        initSelects();
        initFilters();
        loadClients();
    } else {
        const err = document.getElementById("loginError");
        err.innerText = "⚠️ Contrasenya incorrecta";
        err.classList.remove("hidden");
    }
};

document.getElementById("password").addEventListener("keypress", (e) => {
    if (e.key === "Enter") window.login();
});

window.logout = () => {
    document.getElementById("loginDiv").classList.remove("hidden");
    document.getElementById("appDiv").classList.add("hidden");
    document.getElementById("password").value = "";
};

function initSelects(){
    const p=document.getElementById("poble"), fp=document.getElementById("filtrePoble");
    const x=document.getElementById("xarxaExterna"), fx=document.getElementById("filtreXarxa");
    p.innerHTML = '<option value="">Selecciona...</option>';
    fp.innerHTML = '<option value="">Tots els pobles</option>';
    x.innerHTML = '<option value="">Selecciona...</option>';
    fx.innerHTML = '<option value="">Totes les xarxes</option>';
    poblacions.sort().forEach(v => { p.innerHTML+=`<option>${v}</option>`; fp.innerHTML+=`<option>${v}</option>`; });
    xarxes.sort().forEach(v => { x.innerHTML+=`<option>${v}</option>`; fx.innerHTML+=`<option>${v}</option>`; });
}

function initFilters(){
    [filtreNom, filtreNum, filtrePoble, filtreXarxa].forEach(el => el.addEventListener("input", renderList));
    document.querySelectorAll(".filtreContracte").forEach(el => el.addEventListener("change", renderList));
}

function loadClients(){
    onSnapshot(collection(db,"clients"), snap => {
        clients = [];
        snap.forEach(d => clients.push({id:d.id, ...d.data()}));
        renderList();
    });
}

function renderList(){
    const nomF=filtreNom.value.toLowerCase(), numF=filtreNum.value, pobleF=filtrePoble.value, xarxaF=filtreXarxa.value;
    const contractesF=[...document.querySelectorAll(".filtreContracte:checked")].map(c=>c.value);

    filtratsActuals = clients.filter(c => {
        if(nomF && !c.nom?.toLowerCase().includes(nomF)) return false;
        if(numF && !c.numClient?.includes(numF)) return false;
        if(pobleF && c.poble!==pobleF) return false;
        if(xarxaF && c.xarxaExterna!==xarxaF) return false;
        if(contractesF.length>0 && !contractesF.every(v=>c.contracte?.includes(v))) return false;
        return true;
    }).sort((a,b) => (a.nom > b.nom ? 1 : -1));

    const listDiv = document.getElementById("clientList");
    listDiv.innerHTML = "";
    filtratsActuals.forEach(c => {
        const div = document.createElement("div");
        div.className = "client-item";
        div.innerHTML = `<div><div class="client-info-main">${c.nom}</div><div class="client-info-sub"><span class="badge">${c.numClient || 'S/N'}</span> 📍 ${c.poble}</div></div><button class="btn-danger" onclick="event.stopPropagation(); eliminarClient('${c.id}', '${c.nom}')">🗑</button>`;
        div.onclick = () => carregarClient(c);
        listDiv.appendChild(div);
    });
}

// FUNCIÓ EXCEL
window.exportarExcel = () => {
    if(filtratsActuals.length === 0) return alert("No hi ha dades per exportar.");
    
    // Preparem les dades netes per l'Excel
    const dadesExcel = filtratsActuals.map(c => ({
        "Nom": c.nom,
        "Nº Client": c.numClient || "",
        "Població": c.poble || "",
        "Xarxa": c.xarxaExterna || "",
        "Velocitat": c.velocitatFibra || "",
        "Serveis": (c.contracte || []).join(", ")
    }));

    const worksheet = XLSX.utils.json_to_sheet(dadesExcel);
    const workbook = XLSX.utils.book_new();
    XLSX.utils.book_append_sheet(workbook, worksheet, "Clients");
    
    // Generar fitxer amb data actual
    const dataRef = new Date().toISOString().slice(0,10);
    XLSX.writeFile(workbook, `Llistat_Clients_FOC_${dataRef}.xlsx`);
};

window.nouClient=()=>{
    indexActual=null;
    document.getElementById("formTitle").innerText = "Nou Client";
    ["nom","numClient","poble","xarxaExterna","velocitatFibra"].forEach(id => document.getElementById(id).value = "");
    document.querySelectorAll(".contracteOpcio").forEach(cb => cb.checked = false);
    document.getElementById("nom").focus();
};

window.guardarClient=async()=>{
    if(!nom.value) return alert("El nom és obligatori");
    const c = {
        nom: nom.value, numClient: numClient.value, poble: poble.value,
        xarxaExterna: xarxaExterna.value, velocitatFibra: velocitatFibra.value,
        contracte: [...document.querySelectorAll(".contracteOpcio:checked")].map(cb=>cb.value)
    };
    try {
        if(indexActual==null) await addDoc(collection(db,"clients"),c);
        else await setDoc(doc(db,"clients",indexActual),c);
        nouClient();
    } catch(e) { alert("Error al guardar"); }
};

window.carregarClient=c=>{
    indexActual=c.id;
    document.getElementById("formTitle").innerText = "Editant: " + c.nom;
    nom.value=c.nom; numClient.value=c.numClient; poble.value=c.poble;
    xarxaExterna.value=c.xarxaExterna; velocitatFibra.value=c.velocitatFibra;
    const serveis = c.contracte || [];
    document.querySelectorAll(".contracteOpcio").forEach(cb => cb.checked = serveis.includes(cb.value));
};

window.eliminarClient=async (id, nom)=>{
    if(confirm(`Eliminar ${nom}?`)) await deleteDoc(doc(db,"clients",id));
};
</script>
</body>
</html>
